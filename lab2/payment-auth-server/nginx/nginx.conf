# Минимальный конфиг для Nginx
events {
    worker_connections 1024;
}

http {
    # Базовые настройки
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Логирование
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    server {
        # Слушаем HTTPS на порту 8888
        listen 8888 ssl;
        server_name localhost;

        # Пути к сертификатам (сгенерированы в Dockerfile)
        ssl_certificate /app/certs/cert.pem;
        ssl_certificate_key /app/certs/key.pem;

        # Настройки TLS (безопасные)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri /index.html;
        }

        # Проксирование всех запросов /api/v1/ на Go-сервер
        location /api/v1/ {
            proxy_pass http://127.0.0.1:8080/api/v1/;
            
            # Передаём оригинальные заголовки
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger UI тоже проксируем
        location /api/v1/swagger/ {
            proxy_pass http://127.0.0.1:8080/api/v1/swagger/;
        }
    }
}