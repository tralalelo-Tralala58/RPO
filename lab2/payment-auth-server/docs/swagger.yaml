basePath: /api/v1
definitions:
  models.AuthResponse:
    properties:
      token:
        type: string
    type: object
  models.Card:
    properties:
      balance:
        type: number
      card_number:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_locked:
        type: boolean
      key_id:
        type: integer
      owner_name:
        type: string
    required:
    - card_number
    type: object
  models.Key:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      key_value:
        type: string
    required:
    - key_value
    type: object
  models.LoginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    required:
    - login
    - password
    type: object
  models.Terminal:
    properties:
      address:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      serial_number:
        type: string
    required:
    - serial_number
    type: object
  models.TerminalAuthRequest:
    properties:
      amount:
        type: number
      card_number:
        type: string
      terminal_sn:
        type: string
    required:
    - amount
    - card_number
    - terminal_sn
    type: object
  models.TerminalAuthResponse:
    properties:
      authorized:
        type: boolean
      message:
        type: string
    type: object
  models.Transaction:
    properties:
      amount:
        type: number
      card_id:
        type: integer
      id:
        type: integer
      terminal_id:
        type: integer
      transaction_date:
        type: string
    required:
    - amount
    - card_id
    - terminal_id
    type: object
  models.User:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_admin:
        type: boolean
      login:
        type: string
      name:
        type: string
      password:
        description: ← Для ввода пароля (при создании)
        type: string
    required:
    - login
    - name
    type: object
host: localhost:8888
info:
  contact: {}
  title: Payment Auth API
  version: "1.0"
paths:
