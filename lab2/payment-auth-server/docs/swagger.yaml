            type: object
      security:
      - BearerAuth: []
      summary: Получить карту по ID
      tags:
      - Cards
    put:
      consumes:
      - application/json
      parameters:
      - description: ID карты
        in: path
        name: id
        required: true
        type: integer
      - description: Данные карты
